name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install doc dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocstrings[python] \
            numpy \
            pydantic \
            pyyaml \
            python-dotenv

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
